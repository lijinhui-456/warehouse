# 端口号
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ck2?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username:  
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    timeout: 5000ms


# MyBatis-Plus配置
mybatis-plus:
  #  mapper文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类包名
  type-aliases-package: com.example.warehouse.entity
  # 日志输出
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
# JWT配置，过期时间
jwt:
  expiration: 86400000 # 24小时，单位毫秒
